<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Futefólio</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #ff345c; --bg: #f8f9fa; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; text-align: center; }
    .header { padding: 30px; }
    .logo { font-size: 38px; font-weight: 800; margin-bottom: 20px; }
    .logo span { color: var(--primary); }
    .search-box { width: 90%; max-width: 500px; padding: 15px; border-radius: 30px; border: 1px solid #ddd; outline: none; }
    .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px; justify-content: center; }
    .filter-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1200px; margin: 0 auto; }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
    .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .card-title { padding: 10px; font-size: 12px; font-weight: 600; margin: 0; height: 32px; overflow: hidden; }
    #loader { padding: 100px; font-weight: 800; color: #999; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
    .modal-content { background: #fff; width: 90%; max-width: 500px; margin: 10vh auto; border-radius: 20px; padding: 20px; position: relative; }
    .close { position: absolute; top: 10px; right: 15px; font-size: 25px; cursor: pointer; }
    .tag { display: inline-block; padding: 5px 10px; background: #eee; border-radius: 5px; margin: 3px; font-size: 11px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Fute<span>fólio</span></div>
  <input type="text" id="search" class="search-box" placeholder="Buscar produto..." onkeyup="filter()">
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterBySize('ALL', this)">Todos</button>
  </div>
</div>

<div id="loader">CARREGANDO ESTOQUE ATUALIZADO...</div>
<div class="grid" id="product-grid"></div>

<div id="productModal" class="modal" onclick="if(event.target==this)closeModal()">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwb10RnWKWZHB5hiXS6xzeSKPs8dCN9o4hOnkFG8fVmasDpD74sIcGkzOB8GsxhT2zI/exec';
  let allProducts = [];
  let filteredProducts = [];
  let currentSize = 'ALL';

  // ESTA FUNÇÃO É CHAMADA AUTOMATICAMENTE PELO GOOGLE
  function handleResponse(data) {
    allProducts = data.products;
    filteredProducts = data.products;
    
    const bar = document.getElementById('filter-bar');
    data.availableSizes.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.innerText = s;
      btn.onclick = (e) => filterBySize(s, e.target);
      bar.appendChild(btn);
    });

    document.getElementById('loader').style.display = 'none';
    render();
  }

  // GERA O SCRIPT COM DATA ATUAL PARA FORÇAR ATUALIZAÇÃO
  window.onload = () => {
    const script = document.createElement('script');
    script.src = `${API_URL}?callback=handleResponse&nocache=${Date.now()}`;
    document.body.appendChild(script);
  };

  function render() {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = '';
    const sorted = [...filteredProducts].sort((a,b) => (b.totalStock > 0) - (a.totalStock > 0));
    sorted.forEach(p => {
      grid.innerHTML += `
        <div class="card" onclick="openModal('${p.id}')">
          <img src="${p.mainImage}" style="${p.totalStock <= 0 ? 'opacity:0.4' : ''}">
          <p class="card-title">${p.name}</p>
        </div>`;
    });
  }

  function filter() {
    const term = document.getElementById('search').value.toLowerCase();
    filteredProducts = allProducts.filter(p => {
      const nameMatch = p.name.toLowerCase().includes(term);
      const sizeMatch = currentSize === 'ALL' || p.variants.some(v => 
        (currentSize === 'INFANTIL' ? v.group === 'INFANTIL' : v.name === currentSize) && v.stock > 0
      );
      return nameMatch && sizeMatch;
    });
    render();
  }

  function filterBySize(size, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSize = size;
    filter();
  }

  function openModal(id) {
    const p = allProducts.find(x => x.id == id);
    const body = document.getElementById('modal-body');
    body.innerHTML = `
      <img src="${p.mainImage}" style="width:100%; border-radius:10px;">
      <h3>${p.name}</h3>
      <div style="text-align:left">
        ${p.variants.map(v => `<div class="tag" style="${v.stock <= 0 ? 'opacity:0.3' : 'font-weight:bold'}">${v.name}: ${v.stock} un</div>`).join('')}
      </div>
    `;
    document.getElementById('productModal').style.display = 'block';
  }

  function closeModal() { document.getElementById('productModal').style.display = 'none'; }
</script>
</body>
</html>
