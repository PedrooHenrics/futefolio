<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futefólio | Catálogo Oficial</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #ff345c; --bg: #f8f9fa; --text: #1a1a1b; --shadow: 0 4px 15px rgba(0,0,0,0.05); }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
    .header { padding: 40px 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
    .logo { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 20px; cursor: pointer; }
    .logo span { color: var(--primary); }
    .search-box { width: 100%; max-width: 500px; padding: 14px 24px; border-radius: 100px; border: 1px solid #ddd; outline: none; font-size: 16px; transition: 0.3s; }
    .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255,52,92,0.1); }
    .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 20px; justify-content: center; scrollbar-width: none; }
    .filter-btn { padding: 10px 20px; border: 1px solid #ddd; border-radius: 100px; background: white; cursor: pointer; font-weight: 600; white-space: nowrap; transition: 0.2s; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; } }
    .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; border: 1px solid #eee; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
    .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .card-title { padding: 15px; font-size: 14px; font-weight: 600; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin: 0; line-height: 1.4; }
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; backdrop-filter: blur(8px); overflow-y: auto; }
    .modal-content { background:white; width:100%; max-width:850px; margin: 0 auto; min-height:100vh; position:relative; }
    @media (min-width: 768px) { .modal-content { margin: 40px auto; min-height: auto; border-radius: 30px; display: flex; overflow: hidden; } }
    .close { position:absolute; top:20px; right:20px; background:white; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; z-index:10; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .pagination { display: flex; justify-content: center; gap: 8px; margin: 50px 0; }
    .btn-page { min-width: 40px; height: 40px; border: 1px solid #ddd; background: white; border-radius: 10px; cursor: pointer; font-weight: 700; }
    .btn-page.active { background: var(--primary); color: white; border-color: var(--primary); }
    #loader { text-align: center; padding: 100px; font-weight: 800; font-size: 18px; color: var(--primary); letter-spacing: 2px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="location.reload()">Fute<span>fólio</span></div>
  <input type="text" id="search" class="search-box" placeholder="Qual camisa você procura?" onkeyup="filter()">
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterBySize('ALL', this)">Todas</button>
  </div>
</div>

<div class="container">
  <div id="loader">SINCRONIZANDO ESTOQUE...</div>
  <div class="grid" id="product-grid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div id="productModal" class="modal" onclick="if(event.target==this)closeModal()">
  <div class="modal-content" id="modal-body"></div>
</div>

<script>
  // LINK DA SUA API DO GOOGLE
  const API_URL = 'https://script.google.com/macros/s/AKfycbyCdePXLgDnaELRdy20x7cZuPxf-mPNnOj_9A1lUkZd_lDvhNQbbeZ6BSoV5nIScUORFQ/exec';
  
  let allProducts = [], filteredProducts = [], currentPage = 1, currentSize = 'ALL';
  const itemsPerPage = 24;

  // FUNÇÃO DE CARREGAMENTO ULTRA-ROBUSTA (JSONP)
  function loadData() {
    const script = document.createElement('script');
    script.src = `${API_URL}?callback=handleResponse`;
    document.body.appendChild(script);
  }

  // RECEBE OS DADOS DO GOOGLE SEM ERRO DE CORS
  function handleResponse(data) {
    allProducts = data.products;
    filteredProducts = data.products;
    
    const bar = document.getElementById('filter-bar');
    data.availableSizes.forEach(s => {
      const b = document.createElement('button');
      b.className = 'filter-btn'; b.innerText = s;
      b.onclick = (e) => filterBySize(s, e.target);
      bar.appendChild(b);
    });
    
    document.getElementById('loader').style.display = 'none';
    render();
  }

  window.onload = loadData;

  function render() {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = '';
    const start = (currentPage - 1) * itemsPerPage;
    filteredProducts.slice(start, start + itemsPerPage).forEach(p => {
      grid.innerHTML += `
        <div class="card" onclick="openModal(${allProducts.indexOf(p)})">
          <img src="${p.mainImage}" class="card-img" loading="lazy">
          <p class="card-title">${p.name}</p>
        </div>`;
    });
    renderPagination();
  }

  function renderPagination() {
    const nav = document.getElementById('pagination'); nav.innerHTML = '';
    const total = Math.ceil(filteredProducts.length / itemsPerPage);
    if (total <= 1) return;
    for (let i = 1; i <= total; i++) {
      if (i == 1 || i == total || (i >= currentPage - 1 && i <= currentPage + 1)) {
        const b = document.createElement('button');
        b.className = `btn-page ${i==currentPage?'active':''}`;
        b.innerText = i; b.onclick = () => { currentPage = i; render(); window.scrollTo(0,0); };
        nav.appendChild(b);
      }
    }
  }

  function filter() {
    const term = document.getElementById('search').value.toLowerCase();
    filteredProducts = allProducts.filter(p => {
      const matchName = p.name.toLowerCase().includes(term);
      const matchSize = currentSize === 'ALL' || p.variants.some(v => (currentSize === 'INFANTIL' ? v.group === 'INFANTIL' : v.name === currentSize) && v.stock > 0);
      return matchName && matchSize;
    });
    currentPage = 1; render();
  }

  function filterBySize(s, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentSize = s; filter();
  }

  function openModal(idx) {
    const p = allProducts[idx];
    document.getElementById('modal-body').innerHTML = `
      <span class="close" onclick="closeModal()">✕</span>
      <div style="flex:1; background:#f9f9f9; display:flex; align-items:center; justify-content:center;">
        <img src="${p.mainImage}" style="width:100%; max-height:500px; object-fit:contain;">
      </div>
      <div style="flex:1; padding:40px;">
        <h2 style="margin-top:0; font-size:24px;">${p.name}</h2>
        <p style="color:#666; font-size:14px; margin-bottom:20px;">Selecione o tamanho para verificar a disponibilidade em estoque:</p>
        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap:12px; margin-bottom:30px;">
          ${p.variants.map(v => `
            <div style="padding:12px; background:${v.stock > 0 ? '#fff' : '#f0f0f0'}; border:1px solid #ddd; border-radius:15px; text-align:center; opacity:${v.stock > 0 ? '1' : '0.5'}">
              <div style="font-weight:800; font-size:16px;">${v.name}</div>
              <div style="font-size:11px; color:${v.stock > 0 ? 'green' : 'red'}">${v.stock > 0 ? v.stock + ' em estoque' : 'Esgotado'}</div>
            </div>
          `).join('')}
        </div>
        <a href="https://wa.me/5561999999999?text=Olá! Tenho interesse na ${p.name}" target="_blank" style="display:block; background:#25D366; color:white; text-align:center; padding:18px; border-radius:100px; text-decoration:none; font-weight:800; font-size:16px;">COMPRAR VIA WHATSAPP</a>
      </div>`;
    document.getElementById('productModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() { 
    document.getElementById('productModal').style.display = 'none'; 
    document.body.style.overflow = 'auto';
  }
</script>
</body>
</html>
